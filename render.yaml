services:
  # ── Next.js web service ────────────────────────────────────────────────
  - type: web
    name: launchpadx-web
    runtime: node
    plan: starter
    region: oregon
    branch: migration/supabase-to-firebase
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20.11.0
      - key: NODE_ENV
        value: production

      # Firebase Web SDK (public)
      - key: NEXT_PUBLIC_FIREBASE_API_KEY
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_PROJECT_ID
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_DATABASE_URL
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_APP_ID
        sync: false

      # Firebase Admin SDK (base64-encoded service account JSON)
      - key: FIREBASE_SERVICE_ACCOUNT_BASE64
        sync: false

      # AWS SES
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        sync: false
      - key: SES_FROM_EMAIL
        sync: false
      - key: SES_FROM_NAME
        sync: false

      # Cron
      - key: CRON_SECRET
        sync: false
      - key: NEXT_PUBLIC_CRON_SECRET
        sync: false

      # App
      - key: NEXT_PUBLIC_SITE_URL
        sync: false

  # ── Cron jobs (Replacing Vercel Cron) ───────────────────────────────────
  # Render Cron Jobs are HTTP-triggered tasks that call a URL on a schedule.
  # They each call the matching Next.js API route, sending the CRON_SECRET
  # header for auth. Schedule is documented next to each entry.
  - type: cron
    name: launchpadx-cron-review-batch
    runtime: node
    schedule: "0 9 * * 2,6"   # Tue 09:00 + Sat 09:00 — review batch
    command: >
      curl -fsS -X POST
      -H "Authorization: Bearer ${CRON_SECRET}"
      ${NEXT_PUBLIC_SITE_URL}/api/cron/run-review-batch
    envVars:
      - key: CRON_SECRET
        sync: false
      - key: NEXT_PUBLIC_SITE_URL
        sync: false

  - type: cron
    name: launchpadx-cron-send-responses
    runtime: node
    schedule: "0 10 * * 2,5"  # Tue 10:00 + Fri 10:00 — send responses
    command: >
      curl -fsS -X POST
      -H "Authorization: Bearer ${CRON_SECRET}"
      ${NEXT_PUBLIC_SITE_URL}/api/cron/send-responses
    envVars:
      - key: CRON_SECRET
        sync: false
      - key: NEXT_PUBLIC_SITE_URL
        sync: false

  - type: cron
    name: launchpadx-cron-video-tue
    runtime: node
    schedule: "0 9 * * 2"   # Tuesday 09:00 — Tue-window video invite
    command: >
      curl -fsS -X POST
      -H "Authorization: Bearer ${CRON_SECRET}"
      "${NEXT_PUBLIC_SITE_URL}/api/cron/video/tue"
    envVars:
      - key: CRON_SECRET
        sync: false
      - key: NEXT_PUBLIC_SITE_URL
        sync: false

  - type: cron
    name: launchpadx-cron-video-fri
    runtime: node
    schedule: "0 9 * * 5"   # Friday 09:00 — Fri-window video invite
    command: >
      curl -fsS -X POST
      -H "Authorization: Bearer ${CRON_SECRET}"
      "${NEXT_PUBLIC_SITE_URL}/api/cron/video/fri"
    envVars:
      - key: CRON_SECRET
        sync: false
      - key: NEXT_PUBLIC_SITE_URL
        sync: false

  - type: cron
    name: launchpadx-cron-video-approved
    runtime: node
    schedule: "0 9 * * *"   # Daily 09:00 — approved follow-ups (10-day window)
    command: >
      curl -fsS -X POST
      -H "Authorization: Bearer ${CRON_SECRET}"
      ${NEXT_PUBLIC_SITE_URL}/api/cron/video/approved
    envVars:
      - key: CRON_SECRET
        sync: false
      - key: NEXT_PUBLIC_SITE_URL
        sync: false

  - type: cron
    name: launchpadx-cron-video-rejected
    runtime: node
    schedule: "0 9 * * *"   # Daily 09:00 — rejected follow-ups (10-day window)
    command: >
      curl -fsS -X POST
      -H "Authorization: Bearer ${CRON_SECRET}"
      ${NEXT_PUBLIC_SITE_URL}/api/cron/video/rejected
    envVars:
      - key: CRON_SECRET
        sync: false
      - key: NEXT_PUBLIC_SITE_URL
        sync: false
